services:
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: fintrust
      POSTGRES_USER: fintrustuser
      POSTGRES_PASSWORD: fintrustpassword
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: fintrustuser
      DB_PASSWORD: fintrustpassword
      DB_NAME: fintrust
    ports:
      - "8082:8080"
    depends_on:
      - db
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
    
  
      