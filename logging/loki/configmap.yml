apiVersion: v1
kind: ConfigMap

metadata:
  name: loki-config
  namespace: monitoring

data:
  loki-config.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /loki

      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules

      replication_factor: 1

      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
      - from: 2024-01-01

        store: tsdb

        object_store: filesystem

        schema: v13

        index:
          prefix: index_

          period: 24h

    limits_config:
      allow_structured_metadata: false

    ruler:
      storage:
        type: local

        local:
          directory: /loki/rules

      rule_path: /tmp/loki/rules

      alertmanager_url: http://alertmanager.monitoring.svc.cluster.local:9093

      ring:
        kvstore:
          store: inmemory

      enable_api: true