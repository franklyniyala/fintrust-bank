apiVersion: apps/v1
kind: DaemonSet

metadata:
  name: promtail
  namespace: monitoring

spec:
  selector:
    matchLabels:
      app: promtail

  template:
    metadata:
      labels:
        app: promtail

    spec:
      serviceAccountName: promtail

      containers:
      - name: promtail

        image: grafana/promtail:3.0.0

        args:
        - "-config.file=/etc/promtail/promtail.yaml"

        volumeMounts:

        - name: config
          mountPath: /etc/promtail

        - name: run
          mountPath: /run/promtail

        - name: pods
          mountPath: /var/log/pods
          readOnly: true

        - name: containers
          mountPath: /var/lib/docker/containers
          readOnly: true

      volumes:

      - name: config
        configMap:
          name: promtail-config

      - name: run
        emptyDir: {}

      - name: pods
        hostPath:
          path: /var/log/pods

      - name: containers
        hostPath:
          path: /var/lib/docker/containers