apiVersion: apps/v1
kind: Deployment

metadata:
  name: alertmanager
  namespace: monitoring

spec:
  replicas: 1

  selector:
    matchLabels:
      app: alertmanager

  template:
    metadata:
      labels:
        app: alertmanager

    spec:
      containers:

      - name: alertmanager

        image: prom/alertmanager:v0.28.1

        ports:
        - containerPort: 9093

        volumeMounts:
        - name: config
          mountPath: /etc/alertmanager

      volumes:
      - name: config

        configMap:
          name: alertmanager-config