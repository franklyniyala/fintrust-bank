apiVersion: v1
data:
  dashboard.yml: |-
    apiVersion: 1

    providers:
      - name: FinTrust
        orgId: 1
        folder: FinTrust
        type: file
        disableDeletion: false
        editable: true

        options:
          path: /var/lib/grafana/dashboards
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
