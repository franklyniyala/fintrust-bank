apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole

metadata:
  name: kube-state-metrics

rules:

- apiGroups: [""]

  resources:
  - pods
  - services
  - nodes
  - namespaces

  verbs:
  - list
  - watch

- apiGroups:
  - apps

  resources:
  - deployments
  - replicasets

  verbs:
  - list
  - watch