apiVersion: v1
data:
  prometheus.yml: |+
    global:
      scrape_interval: 15s

    scrape_configs:

      - job_name: "prometheus"

        static_configs:
          - targets:
              - localhost:9090

      - job_name: "node-exporter"

        static_configs:
          - targets:
              - node-exporter.monitoring.svc.cluster.local:9100

      - job_name: "postgres-exporter"

        static_configs:
          - targets:
              - postgres-exporter.monitoring.svc.cluster.local:9187

kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
