apiVersion: rbac.authorization.k8s.io/v1
kind: Role

metadata:
  name: fintrust-deployer-role
  namespace: default

rules:

- apiGroups: [""]

  resources:
    - pods
    - services
    - configmaps
    - secrets

  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch

- apiGroups: ["apps"]

  resources:
    - deployments
    - replicasets

  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch